name: FrameForge
options:
  bundleIdPrefix: com.lalitkhatri
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    majorVersion: 13.3.0
targets:
  FrameForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FrameForge
    info:
      path: FrameForge/Info.plist
      properties:
        UILaunchScreen: {}
        GADApplicationIdentifier: ca-app-pub-8035596577604363~8815402433
        # Production 300×250 medium-rectangle ad unit (supports video creatives).
        # Replace XXXXXXXXXX with your real ad unit ID from AdMob console.
        GADVideoAdUnitID: ca-app-pub-8035596577604363/XXXXXXXXXX
        # Tenor API key for GIF sticker search. Get one at https://developers.google.com/tenor
        TenorAPIKey: YOUR_TENOR_API_KEY_HERE
        NSPhotoLibraryUsageDescription: FrameForge needs access to your photo library to import videos and images for editing.
        NSPhotoLibraryAddUsageDescription: FrameForge needs permission to save exported videos to your photo library.
        NSMicrophoneUsageDescription: FrameForge needs microphone access to record voiceovers for your projects.
        NSSpeechRecognitionUsageDescription: FrameForge uses speech recognition to auto-generate captions from your video audio.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: FrameForge/FrameForge.entitlements
    settings:
      CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    dependencies:
      - package: GoogleMobileAds

  FrameForgeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [FrameForgeUITests]
    dependencies:
      - target: FrameForge
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.lalitkhatri.FrameForgeUITests
      TEST_TARGET_NAME: FrameForge
